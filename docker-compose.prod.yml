services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: zazz_board_postgres_prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zazz_board_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - zazz_board_postgres_prod_data:/var/lib/postgresql/data
    networks:
      - zazz_board_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-zazz_board_db}" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # Fastify API Server (Production)
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: zazz_board_api_prod
    ports:
      - "3030:3030"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-zazz_board_db}
      NODE_ENV: production
      PORT: 3030
    networks:
      - zazz_board_network
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "node scripts/bootstrap-first-run.js && npm start"
    restart: unless-stopped

  # React Client (Production - Nginx)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: zazz_board_client_prod
    ports:
      - "80:80"
    networks:
      - zazz_board_network
    depends_on:
      - api
    restart: unless-stopped

volumes:
  zazz_board_postgres_prod_data:

networks:
  zazz_board_network:
    driver: bridge
