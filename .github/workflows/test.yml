name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: zazz_board_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Create test database
        run: PGPASSWORD=password psql -h localhost -U postgres -p 5432 -c "CREATE DATABASE zazz_board_test;" || true

      - name: Install dependencies
        run: npm ci

      - name: Reset test database
        run: cd api && DATABASE_URL=postgres://postgres:password@localhost:5432/zazz_board_test npm run db:reset

      - name: Run tests
        run: npm run test
        env:
          DATABASE_URL_TEST: postgres://postgres:password@localhost:5432/zazz_board_test
          NODE_ENV: test
