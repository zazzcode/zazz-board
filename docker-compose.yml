services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: zazz_board_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zazz_board_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5433:5432"  # Using 5433 to avoid conflict with existing containers
    volumes:
      - zazz_board_postgres_data:/var/lib/postgresql/data
    networks:
      - zazz_board_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-zazz_board_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Fastify API Server
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: zazz_board_api
    ports:
      - "3030:3030"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-zazz_board_db}
      NODE_ENV: production
      PORT: 3030
    networks:
      - zazz_board_network
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "node scripts/bootstrap-first-run.js && npm start"

  # React Client (Development)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: zazz_board_client
    ports:
      - "3001:80"
    networks:
      - zazz_board_network
    depends_on:
      - api

volumes:
  zazz_board_postgres_data:

networks:
  zazz_board_network:
    driver: bridge
